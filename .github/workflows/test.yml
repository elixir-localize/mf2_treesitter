name: test

on:
  push:
    branches: [main]
  pull_request:

# Runs the tree-sitter CLI corpus tests + the MF2 WG conformance
# suite on every push and PR, across the platforms the grammar
# supports. The native Node binding is rebuilt on each runner so
# any portability issues in `binding.gyp` / `binding.cc` surface
# here.

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # Fails CI on any high- or critical-severity vulnerability in
      # the dep tree. Lower-severity advisories flow through
      # Dependabot's weekly PRs instead. Runs on ubuntu only to avoid
      # duplicate failures across the matrix.
      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --audit-level=high

      - name: tree-sitter test (corpus)
        run: npm run test:corpus

      - name: MF2 WG conformance suite
        run: npm run test:conformance
