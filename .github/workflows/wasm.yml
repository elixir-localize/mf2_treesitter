name: wasm

on:
  push:
    branches: [main]
  pull_request:

# Builds the WASM artefact from source and verifies it behaves
# correctly by running the full MF2 WG conformance suite against the
# fresh output. We don't byte-compare against the committed
# `wasm/tree-sitter-mf2.wasm` — emscripten's output varies across
# hosts in non-essential ways (embedded paths, metadata sections,
# section ordering) even though semantics are identical. The
# conformance suite is the real correctness gate; byte equality is
# over-strict.
#
# Drift of the *committed* WASM from grammar.js is still guarded,
# just indirectly: generate.yml catches any parser.c / grammar.json
# drift, and the published npm package ships whatever WASM was
# committed alongside grammar.js in that version. Maintainers
# refresh the committed WASM with `npm run build-wasm` before
# tagging a release; prepublishOnly enforces this locally.

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install tree-sitter CLI
        run: npm ci

      # tree-sitter build --wasm uses emscripten. The tree-sitter CLI
      # can run emscripten inside Docker when it's not on PATH; GitHub
      # runners come with Docker pre-installed so this Just Works.
      - name: Build WASM
        run: ./node_modules/.bin/tree-sitter build --wasm --output wasm/tree-sitter-mf2.wasm

      - name: Run conformance suite against fresh WASM
        run: npm run test:conformance
